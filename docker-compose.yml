services:
  # 1. ฐานข้อมูล PostgreSQL
  db:
    image: postgres:16-alpine
    container_name: tts_db_container
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-rootroot}
      POSTGRES_DB: ${DB_NAME:-tts_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  # 2. Backend (Node.js + Prisma)
  server:
    build: 
      context: ./server
    container_name: tts_server_container
    ports:
      - "3001:3001"
    environment:
      - DATABASE_URL=postgresql://postgres:rootroot@db:5432/tts_db
      - PORT=3001
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./server:/app
      - /app/node_modules

  # 3. Frontend (React)
  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    stdin_open: true # สำหรับ React บางเวอร์ชันเพื่อให้รันได้ใน Docker
    depends_on:
      - server

volumes:
  postgres_data: